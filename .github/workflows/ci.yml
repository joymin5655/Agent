# CI for the agent-harness plugin — secret scan, plugin manifest validation, sanitize gate.
# (Actions use major-version tags; pin to commit SHAs for stricter supply-chain hardening.)
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # weekly Mon 06:00 UTC

permissions:
  contents: read
  pull-requests: read   # gitleaks-action@v2 enumerates PR commits via the API on pull_request events

jobs:
  secret-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: gitleaks.toml

  validate-plugin:
    name: validate plugin manifests + hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The four checks now live in core/tests/registry-drift.sh (one source of
      # truth) so they also run locally and inside verify-all.sh, instead of being
      # trapped in this YAML. This job is a thin caller.
      - name: Validate manifests, hook refs, agent frontmatter, and registry↔agent model drift
        run: bash core/tests/registry-drift.sh

  sanitize:
    name: sanitize gate (no prior-project taint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # history needed to diff the PR/push commit range (--range scan)
      - name: Grep tracked files for prior-project tokens (excluding legacy/ and the audit tool)
        run: |
          # legacy/ is the intentional archive; the audit script and this workflow
          # both contain the forbidden tokens as literals (the grep pattern itself).
          hits=$(git grep -iE 'airlens|obsidian-airlens' -- ':!legacy' ':!core/tests/sanitize-audit.sh' ':!.github/workflows/ci.yml' || true)
          if [ -n "$hits" ]; then
            echo "Sanitize gate failed — prior-project tokens in core:"
            echo "$hits"
            exit 1
          fi
          echo "sanitize gate clean"
      - name: Full token-set audit (superset — same script devs run locally)
        run: bash core/tests/sanitize-audit.sh
      - name: Range taint scan (catch add-then-remove across PR/push commits, not just HEAD)
        run: |
          # The HEAD audit above misses a token added in one commit and removed in a
          # later one (HEAD ends clean). Scan the added lines of every commit in the
          # incoming range so that add-then-remove taint is caught before/at merge.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            before="${{ github.event.before }}"
            case "$before" in *[!0]*) RANGE="$before..${{ github.sha }}" ;; *) RANGE="" ;; esac
          else
            RANGE=""
          fi
          if [ -z "$RANGE" ]; then
            echo "no commit range for event '${{ github.event_name }}' — skipping range scan"
            exit 0
          fi
          echo "range taint scan over $RANGE"
          bash core/tests/sanitize-audit.sh --range "$RANGE"
      - name: Verify the sanitize gate (fixture detection — pairs the gate with its test)
        run: bash core/tests/sanitize-audit-test.sh

  supply-chain-scan:
    name: supply-chain scan (no self-injection directives)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan shipped instruction files + hooks for injection-style directives
        run: bash core/tests/supply-chain-scan.sh
      - name: Verify the scanner (fixture detection + clean-tree pass + no false-positive)
        run: bash core/tests/supply-chain-scan-test.sh

  doc-reality:
    name: doc-reality (no doc drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gate docs against repo reality (paths exist + counts match)
        run: bash core/tests/doc-reality.sh
      - name: Verify the gate (fixture detection + clean-tree pass + no false-positive)
        run: bash core/tests/doc-reality-test.sh

  evals:
    name: evals (labeled dataset, Pass^3, regression gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run the eval suite (Pass^3 + baseline regression gate)
        run: python3 evals/run-evals.py
      - name: Verify the eval runner (mislabel detection + regression + dataset defects)
        run: bash core/tests/evals-test.sh
      - name: Run the semantic track (test-meaningfulness judge, Pass^3 + regression gate)
        run: |
          python3 evals/run-evals.py \
            --dataset evals/datasets/semantic-judge.jsonl \
            --baseline evals/baseline-semantic.json \
            --verifier evals/judges/reference-judge.py
      - name: Verify the reference judge (green-by-construction detection + leak-safety)
        run: bash core/tests/reference-judge-test.sh

  verify:
    name: verify-all (unified runner — every core/tests check, no silent omission)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Anti-lying self-test first: proves the runner enumerates every core/tests
      # script (a battery/gate dropped from the runner fails here) before we trust
      # its all-green. Without this step the completeness guarantee gates nothing.
      - name: Verify the runner enumerates every check (completeness / fail-propagation)
        run: bash core/tests/verify-all-test.sh
      # Then execute the full discovered set. This is the SOLE CI executor of the
      # checks that have no dedicated job, and auto-includes any future core/tests
      # script with no edit here. gitleaks is not installed on this runner, so the
      # runner reports it as a loud SKIP (the dedicated secret-scan job enforces it).
      - name: Run the full discovered check set
        run: bash core/tests/verify-all.sh

  plugin-path-install:
    name: plugin-path install smoke (marketplace/plugin cache → doctor guidance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Distinct from clean-install below: clean-install proves the SHELL install
      # path (`setup.sh --claude`) end to end. This job proves the PLUGIN/marketplace
      # install path — which never runs setup.sh's install functions at all — still
      # gets a working doctor: plugin-cache detection, the gh presence check, and
      # brain-MCP plugin-path guidance (detect-and-guide only, never an auto-write).
      # core/tests/plugin-path-install-test.sh is the single source of truth for the
      # operations this job performs; this step is a thin caller (same "gate is a
      # standalone script, CI just runs it" shape as doc-reality/supply-chain-scan).
      - name: Run the plugin-path install battery (doctor guidance + loud-degrade + anti-vacuous manifest probe)
        run: bash core/tests/plugin-path-install-test.sh

  clean-install:
    name: clean-install smoke (bare checkout → scratch-home install → doctor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Cold-install proof (M-5): the portable-harness promise is "install once,
      # use everywhere", but until this job the only cold install was a manual
      # one. A scratch $HOME stands in for a machine that has never seen the
      # harness; AGENT_SETUP_YES=1 answers the overwrite prompts so the run is
      # non-interactive.
      - name: Install all three runtimes into a scratch config home
        run: |
          SCRATCH="$(mktemp -d)"
          echo "SCRATCH=$SCRATCH" >> "$GITHUB_ENV"
          HOME="$SCRATCH" AGENT_SETUP_YES=1 bash setup.sh --all
      # Anti-vacuous: prove the install wrote all three runtime configs and
      # actually templated them (an install that silently no-ops — or writes
      # files with the {{FRAMEWORK_ROOT}} placeholder unexpanded — would
      # otherwise pass this job on the doctor's absence-tolerant checks alone).
      # This step, not the doctor, is what verifies the fresh install: the
      # doctor's checks are repo/env-scoped and tolerate an empty home.
      - name: Assert the install produced and templated all three runtime configs
        run: |
          test -f "$SCRATCH/.claude/settings.json"
          test -f "$SCRATCH/.codex/config.toml"
          test -f "$SCRATCH/.gemini/settings.json"
          grep -q "$GITHUB_WORKSPACE" "$SCRATCH/.claude/settings.json"
          ! grep -q '{{FRAMEWORK_ROOT}}' "$SCRATCH/.claude/settings.json"
      # The doctor then diagnoses env + repo health from a machine that has
      # never seen the harness before (absence-tolerant checks must skip/WARN,
      # never FAIL, on the empty scratch home).
      - name: Doctor must report 0 fail against the scratch home
        run: HOME="$SCRATCH" bash setup.sh --doctor
      # Mutation probe: a hook that lost its executable bit must turn the
      # doctor red — proves this job's green is load-bearing rather than a
      # doctor that passes anything (same discipline as the verify-all and
      # gate fixture batteries).
      - name: Mutation probe — doctor must fail when a hook loses its exec bit
        run: |
          chmod -x core/hooks/pre-tool-guard.sh
          if HOME="$SCRATCH" bash setup.sh --doctor; then
            echo "MUTATION NOT CAUGHT: doctor stayed green with a non-executable hook" >&2
            exit 1
          fi
          chmod +x core/hooks/pre-tool-guard.sh
