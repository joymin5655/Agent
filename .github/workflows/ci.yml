name: CI

on:
  pull_request:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate config JSON
        run: python3 scripts/ci/validate-configs.py

      - name: Run hook tests
        run: |
          python3 core/hooks/test_supervisor_routing.py
          python3 core/hooks/test_hooks_dynamic_root.py

      - name: Run installer smoke tests
        run: bash scripts/ci/installer-smoke.sh

      - name: Secret scan
        run: |
          if command -v gitleaks >/dev/null 2>&1; then
            gitleaks detect --no-git --source . --config gitleaks.toml
          else
            echo "::notice::gitleaks is not installed; skipping secret scan"
          fi
