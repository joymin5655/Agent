name: Daily Data Collection

on:
  schedule:
    - cron: '0 3 * * *'  # 매일 03:00 UTC (KST 12:00)
  workflow_dispatch:       # 수동 실행 가능

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      - name: Install dependencies (경량)
        run: pip install pandas requests pyarrow numpy huggingface_hub

      # OpenAQ daily 수집 단계 제거됨 (2026-04-28 deprecated).
      # 글로벌 PM2.5/PM10/O3/NO2/CO는 data-collect-hourly.yml의 Open-Meteo Air Quality grid가 single source.
      # cloud_collect.py --mode daily 호출 미사용 (script는 history 재처리용으로 보존).

      - name: Backup existing data to HuggingFace Hub
        if: always()
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -d "./data/collected" ] && [ -n "$(ls -A ./data/collected 2>/dev/null)" ]; then
            python apps/web/scripts/cloud_collect.py --mode backup --output-dir ./data/collected
          else
            echo "  No collected data — skipping HF backup"
          fi
        continue-on-error: true

      - name: Generate 90-day PM2.5 daily summary
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cat > gen_daily_summary.py << 'SCRIPT'
          """
          Query weather_history (data_type='aqi', last 90 days) and compute
          daily average AQI for the Analytics 90-day bar chart.
          Server-Collect pattern: DB → JSON → Supabase Storage.
          """
          import json, os, urllib.request
          from datetime import datetime, timezone, timedelta
          from collections import defaultdict

          URL = os.environ["SUPABASE_URL"]
          KEY = os.environ["SUPABASE_SERVICE_KEY"]
          now = datetime.now(timezone.utc)
          cutoff = (now - timedelta(days=90)).isoformat()

          headers = {
              "Authorization": f"Bearer {KEY}",
              "apikey": KEY,
              "Content-Type": "application/json",
          }

          # Query all AQI snapshots from last 90 days (ref_time + station count only)
          query_url = (
              f"{URL}/rest/v1/weather_history"
              f"?data_type=eq.aqi"
              f"&ref_time=gte.{cutoff}"
              f"&order=ref_time.asc"
              f"&select=ref_time,point_count,payload"
          )
          req = urllib.request.Request(query_url, headers=headers)

          try:
              resp = urllib.request.urlopen(req, timeout=60)
              rows = json.loads(resp.read())
          except Exception as e:
              print(f"  DB query failed: {e}")
              rows = []

          if not rows:
              print("  No AQI history found — skipping 90-day summary")
          else:
              # Group by date, compute daily average AQI across all stations
              daily = defaultdict(list)
              for row in rows:
                  ref = row["ref_time"][:10]  # YYYY-MM-DD
                  payload = row["payload"]
                  if isinstance(payload, str):
                      payload = json.loads(payload)
                  stations = payload.get("stations", [])
                  if stations:
                      avg = sum(s.get("aqi", 0) for s in stations) / len(stations)
                      daily[ref].append(avg)

              # Average across hourly snapshots per day
              result = {
                  "generated_at": now.isoformat(),
                  "days": sorted([
                      {"date": date, "avg_aqi": round(sum(vals) / len(vals), 1)}
                      for date, vals in daily.items()
                  ], key=lambda x: x["date"]),
                  "count": len(daily),
              }

              with open("pm25-daily-90d.json", "w") as f:
                  json.dump(result, f, separators=(",", ":"))
              print(f"  90-day summary: {len(daily)} days from {len(rows)} snapshots")

              # Upload to Supabase Storage
              with open("pm25-daily-90d.json", "rb") as f:
                  data = f.read()
              upload_url = f"{URL}/storage/v1/object/wind-data/pm25-daily-90d.json"
              upload_req = urllib.request.Request(
                  upload_url, data=data, method="POST",
                  headers={
                      "Authorization": f"Bearer {KEY}",
                      "Content-Type": "application/json",
                      "x-upsert": "true",
                  },
              )
              try:
                  urllib.request.urlopen(upload_req, timeout=15)
                  print("  Uploaded pm25-daily-90d.json")
              except Exception as e:
                  print(f"  Upload failed: {e}")
          SCRIPT
          python3 gen_daily_summary.py
        continue-on-error: true

      - name: Collect news articles (RSS + NewsData.io → DB)
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          INGEST_API_KEY: ${{ secrets.INGEST_API_KEY }}
        run: |
          if [ -n "$INGEST_API_KEY" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              "${SUPABASE_URL}/functions/v1/news-aggregator" \
              -H "Authorization: Bearer ${INGEST_API_KEY}" \
              -H "Content-Type: application/json")
            echo "  news-aggregator: HTTP ${STATUS}"
          else
            echo "  INGEST_API_KEY not set — skipping news collection"
          fi
        continue-on-error: true

      - name: Summary
        if: always()
        run: |
          echo "## 데이터 수집 결과" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "data/collected" ]; then
            echo "| 파일 | 크기 |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|" >> $GITHUB_STEP_SUMMARY
            for f in data/collected/*.parquet; do
              if [ -f "$f" ]; then
                size=$(du -h "$f" | cut -f1)
                echo "| $(basename $f) | $size |" >> $GITHUB_STEP_SUMMARY
              fi
            done
          else
            echo "수집된 데이터 없음" >> $GITHUB_STEP_SUMMARY
          fi
