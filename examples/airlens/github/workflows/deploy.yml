name: Deploy to Cloudflare Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_POLAR_PRODUCT_ID_EXPLORER: ${{ secrets.VITE_POLAR_PRODUCT_ID_EXPLORER }}
          VITE_POLAR_PRODUCT_ID_RESEARCHER: ${{ secrets.VITE_POLAR_PRODUCT_ID_RESEARCHER }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_CHAT_WORKER_URL: ${{ secrets.VITE_CHAT_WORKER_URL }}
          VITE_R2_UPLOAD_WORKER_URL: ${{ secrets.VITE_R2_UPLOAD_WORKER_URL }}
          VITE_ML_WORKER_URL: ${{ secrets.VITE_ML_WORKER_URL }}
          VITE_DQSS_WORKER_URL: ${{ secrets.VITE_DQSS_WORKER_URL }}
          # Sentry release tracking — vite plugin auto-skips when token absent
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          GITHUB_SHA: ${{ github.sha }}
        run: npm run build

      # Defense-in-depth — guarantee no .map ships to Cloudflare even if the
      # Sentry plugin's filesToDeleteAfterUpload didn't run (e.g., upload 403,
      # network failure, plugin crash). Idempotent: no-op when no .map exists.
      - name: Strip sourcemaps from dist (safety net)
        if: always()
        run: |
          find dist -type f \( -name '*.js.map' -o -name '*.css.map' \) -print -delete
          # Reassert: zero .map files in deploy artifact
          remaining=$(find dist -type f -name '*.map' | wc -l)
          if [ "$remaining" -ne 0 ]; then
            echo "::error::Found $remaining .map file(s) still in dist after strip"
            find dist -type f -name '*.map'
            exit 1
          fi
          echo "Sourcemap strip OK — 0 .map files in dist"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd  # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: pages deploy dist --project-name=airlens --commit-dirty=true --commit-message="${{ github.sha }}"

      - name: PostHog deploy annotation
        if: success()
        env:
          POSTHOG_PERSONAL_API_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
          POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
        run: |
          if [ -z "$POSTHOG_PERSONAL_API_KEY" ] || [ -z "$POSTHOG_PROJECT_ID" ]; then
            echo "PostHog annotation secrets missing — skipping (non-blocking)"
            exit 0
          fi
          curl -sS -X POST \
            "https://us.i.posthog.com/api/projects/${POSTHOG_PROJECT_ID}/annotations/" \
            -H "Authorization: Bearer ${POSTHOG_PERSONAL_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"Deploy ${{ github.sha }}\",\"date_marker\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"scope\":\"project\"}" \
            || echo "PostHog annotation failed (non-blocking)"
