name: Lighthouse CI

# Phase 5 (2026-05-01): WEB_PRD §11 Open Decision #15 closed default —
# release tag (`v*.*.*`) push 시 자동 실행. PR 단위 비채택 (noise 우려).
# workflow_run on deploy 도 유지 (main push → deploy 후 자동 baseline)
# workflow_dispatch 로 ad-hoc 실행 가능
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_run:
    workflows: ["Deploy to Cloudflare Pages"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build
        working-directory: apps/web
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
          VITE_POSTHOG_KEY: ''
        run: npm run build

      - name: Run Lighthouse
        working-directory: apps/web
        run: npx --yes @lhci/cli@0.14.x autorun --config=lighthouserc.json
        continue-on-error: true

      - name: Format Lighthouse results
        if: always()
        id: format
        working-directory: apps/web
        run: |
          if [ -d ".lighthouseci" ]; then
            node -e "
              const fs = require('fs');
              const files = fs.readdirSync('.lighthouseci').filter(f => f.endsWith('.json') && f.startsWith('lhr-'));
              const results = files.map(f => {
                const lhr = JSON.parse(fs.readFileSync('.lighthouseci/' + f, 'utf-8'));
                return {
                  url: lhr.finalUrl || lhr.requestedUrl,
                  performance: Math.round((lhr.categories?.performance?.score || 0) * 100),
                  accessibility: Math.round((lhr.categories?.accessibility?.score || 0) * 100),
                  bestPractices: Math.round((lhr.categories?.['best-practices']?.score || 0) * 100),
                  seo: Math.round((lhr.categories?.seo?.score || 0) * 100),
                  lcp: lhr.audits?.['largest-contentful-paint']?.numericValue,
                  cls: lhr.audits?.['cumulative-layout-shift']?.numericValue,
                  tbt: lhr.audits?.['total-blocking-time']?.numericValue,
                };
              });

              let md = '## Lighthouse Results\n\n';
              md += '| Page | Perf | A11y | BP | SEO | LCP | CLS | TBT |\n';
              md += '|------|------|------|-----|-----|-----|-----|-----|\n';
              for (const r of results) {
                const page = new URL(r.url).pathname;
                const lcp = r.lcp ? (r.lcp/1000).toFixed(1) + 's' : '-';
                const cls = r.cls !== undefined ? r.cls.toFixed(3) : '-';
                const tbt = r.tbt ? Math.round(r.tbt) + 'ms' : '-';
                md += '| ' + [page, r.performance, r.accessibility, r.bestPractices, r.seo, lcp, cls, tbt].join(' | ') + ' |\n';
              }

              // Budget check
              const budgetFails = results.filter(r =>
                r.lcp > 2500 || r.cls > 0.1 || r.tbt > 200
              );
              if (budgetFails.length > 0) {
                md += '\n### Budget Violations\n';
                for (const r of budgetFails) {
                  const page = new URL(r.url).pathname;
                  if (r.lcp > 2500) md += '- ' + page + ': LCP ' + (r.lcp/1000).toFixed(1) + 's > 2.5s\n';
                  if (r.cls > 0.1) md += '- ' + page + ': CLS ' + r.cls.toFixed(3) + ' > 0.1\n';
                  if (r.tbt > 200) md += '- ' + page + ': TBT ' + Math.round(r.tbt) + 'ms > 200ms\n';
                }
              }

              fs.writeFileSync('lighthouse-summary.md', md);
              console.log(md);
            "
          fi

      - name: Upload Lighthouse summary artifact
        if: always() && hashFiles('apps/web/lighthouse-summary.md') != ''
        uses: actions/upload-artifact@de65e23aa2b7e23d713bb51fbfcb6d502f8667d8  # v4.4.3
        with:
          name: lighthouse-summary
          path: apps/web/lighthouse-summary.md
          retention-days: 30

      - name: Annotate run with Lighthouse results
        if: always() && hashFiles('apps/web/lighthouse-summary.md') != ''
        run: |
          {
            echo "# Lighthouse"
            cat apps/web/lighthouse-summary.md
          } >> "$GITHUB_STEP_SUMMARY"
