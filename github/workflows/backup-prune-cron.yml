name: backup-prune-cron

# F9 Encrypted Backup — daily cron that invokes the backup-prune Edge Function
# to delete app-encrypted-backups/{user_id}/ objects for accounts whose Pro→Free
# downgrade exceeded the 30-day grace window (F2 D-D4).
#
# Edge Function path: apps/web/supabase/functions/backup-prune/index.ts
# Auth: shared-secret header `x-ingest-key` matched against INGEST_API_KEY.

on:
  schedule:
    # 02:30 UTC daily (11:30 KST) — off-peak, after weekly-insight cron window
    - cron: '30 2 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'If "true", invoke ?dry_run=1 (no deletes)'
        required: false
        default: 'false'

permissions:
  contents: read

concurrency:
  group: backup-prune-cron
  cancel-in-progress: false

jobs:
  prune:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Invoke backup-prune Edge Function
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          INGEST_API_KEY: ${{ secrets.INGEST_API_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${INGEST_API_KEY:-}" ]; then
            echo "::error::SUPABASE_URL or INGEST_API_KEY missing"
            exit 1
          fi
          QS=""
          if [ "${DRY_RUN:-false}" = "true" ]; then
            QS="?dry_run=1"
          fi
          HTTP_CODE=$(curl -sS -o /tmp/prune.json -w '%{http_code}' \
            -X POST "${SUPABASE_URL}/functions/v1/backup-prune${QS}" \
            -H "x-ingest-key: ${INGEST_API_KEY}" \
            -H 'Content-Type: application/json' \
            -d '{}')
          echo "HTTP ${HTTP_CODE}"
          cat /tmp/prune.json
          if [ "${HTTP_CODE}" != "200" ] && [ "${HTTP_CODE}" != "204" ]; then
            exit 1
          fi
