name: DB Maintenance (Data Retention)

on:
  schedule:
    - cron: '0 5 * * 1'  # 매주 월요일 05:00 UTC (KST 14:00)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no deletions)'
        required: false
        default: 'false'
        type: boolean

defaults:
  run:
    working-directory: apps/web

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx

      - name: Run data retention cleanup
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: python scripts/db_maintenance.py

      - name: Summary
        if: always()
        run: |
          if [ -f "maintenance_report.json" ]; then
            echo "## DB Maintenance Report" >> "$GITHUB_STEP_SUMMARY"
            python3 -c "
          import json
          with open('maintenance_report.json') as f:
              r = json.load(f)
          print('| Table | Deleted | Remaining |')
          print('|-------|---------|-----------|')
          for t in r.get('tables', []):
              print(f'| {t[\"name\"]} | {t[\"deleted\"]} | {t[\"remaining\"]} |')
          " >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@d746ffe35508b1917358783b479e04febd2b8f71  # v9.0.0
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[Auto] DB Maintenance failed',
              body: `Workflow run failed.\nRun ID: ${context.runId}\nTime: ${new Date().toISOString()}`,
              labels: ['bug', 'data-pipeline']
            });
