name: E2E Tests (Playwright)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Check required secrets
        id: check_secrets
        if: github.event_name != 'pull_request'
        run: |
          if [ -z "${{ secrets.VITE_SUPABASE_URL }}" ] || [ -z "${{ secrets.VITE_SUPABASE_ANON_KEY }}" ]; then
            echo "skip_tests=true" >> $GITHUB_OUTPUT
            echo "VITE_SUPABASE_URL or VITE_SUPABASE_ANON_KEY not set — skipping E2E tests"
          else
            echo "skip_tests=false" >> $GITHUB_OUTPUT
          fi

      - name: Run public E2E tests (no secrets needed)
        env:
          CI: true
          VITE_SUPABASE_URL: 'https://placeholder.supabase.co'
          VITE_SUPABASE_ANON_KEY: 'placeholder-anon-key'
          VITE_POSTHOG_KEY: ''
        run: npx playwright test e2e/public.spec.ts

      - name: Run authenticated E2E tests
        if: github.event_name != 'pull_request' && steps.check_secrets.outputs.skip_tests == 'false'
        env:
          CI: true
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_POSTHOG_KEY: ''
        # public.spec.ts already ran above; visual.spec.ts excluded via testIgnore in playwright.config.ts
        run: npx playwright test e2e/app.spec.ts e2e/navigation.spec.ts e2e/data-assets.spec.ts e2e/authenticated.spec.ts

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14

      - name: Upload test results (videos/traces on failure)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: playwright-test-results
          path: apps/web/test-results/
          retention-days: 7
