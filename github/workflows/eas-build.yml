name: EAS Build (apps/app)

# Pre-launch stub. Manual trigger first; tag-based auto-build after EAS project ID is wired.
# See apps/app/LAUNCH_CHECKLIST.md (Track B) for required secrets and account setup.

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production
      platform:
        description: 'Platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ios
          - android
      submit:
        description: 'Submit to App Store / Play Store after build (production only)'
        required: false
        default: false
        type: boolean

  # Future: tag-based auto-build (uncomment after EAS project ID is set)
  # push:
  #   tags:
  #     - 'app-v*.*.*'

jobs:
  build:
    name: EAS Build (${{ github.event.inputs.profile }} / ${{ github.event.inputs.platform }})
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        working-directory: .
        run: npm ci --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Verify EAS project linkage
        run: |
          if ! grep -q '"projectId"' app.json; then
            echo "::error::EAS project ID not set. Run 'npx eas-cli init' locally first (LAUNCH_CHECKLIST.md §B.3)."
            exit 1
          fi

      - name: EAS Build
        run: |
          npx eas-cli build \
            --profile "${{ github.event.inputs.profile }}" \
            --platform "${{ github.event.inputs.platform }}" \
            --non-interactive \
            --no-wait

      - name: EAS Submit (production only, opt-in)
        if: ${{ github.event.inputs.profile == 'production' && github.event.inputs.submit == 'true' }}
        run: |
          npx eas-cli submit \
            --profile production \
            --platform "${{ github.event.inputs.platform }}" \
            --non-interactive \
            --latest
        env:
          EXPO_APPLE_ID: ${{ secrets.APPLE_ID }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          EXPO_ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          EXPO_ASC_API_KEY_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
          EXPO_ASC_API_KEY_PATH: ${{ secrets.ASC_API_KEY_PATH }}
          EXPO_ANDROID_SERVICE_ACCOUNT_KEY: ${{ secrets.ANDROID_SERVICE_ACCOUNT_KEY }}
