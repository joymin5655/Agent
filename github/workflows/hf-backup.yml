name: Weekly HuggingFace Backup

on:
  schedule:
    - cron: '0 4 * * 0'  # 매주 일요일 04:00 UTC (KST 13:00)
  workflow_dispatch:

defaults:
  run:
    working-directory: apps/web

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install huggingface_hub httpx

      - name: DB snapshot via REST API
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/pg_snapshot.py

      - name: Upload to HuggingFace Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/hf_upload_backup.py

      - name: Summary
        if: always()
        run: |
          echo "## Weekly Backup Report" >> "$GITHUB_STEP_SUMMARY"
          if [ -d "snapshots" ]; then
            echo "| Snapshot | Size |" >> "$GITHUB_STEP_SUMMARY"
            echo "|----------|------|" >> "$GITHUB_STEP_SUMMARY"
            for f in snapshots/*.json; do
              if [ -f "$f" ]; then
                size=$(du -h "$f" | cut -f1)
                echo "| $(basename "$f") | $size |" >> "$GITHUB_STEP_SUMMARY"
              fi
            done
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Destination: HuggingFace Hub (Robeedau/airlens-data)" >> "$GITHUB_STEP_SUMMARY"
