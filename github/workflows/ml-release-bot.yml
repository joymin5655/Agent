name: ML Release Bot

# models artifact 변경 시 release PR 자동 생성.
# 동작:
#   1. airlens-ml-release-bot App 토큰 발급
#   2. models/artifacts/ 변경 감지
#   3. release tag 생성 (ml-YYYYMMDD-HHMM)
#   4. peter-evans/create-pull-request로 PR 오픈 (또는 갱신)
#   5. 사용자 review 후 머지
#
# 트리거:
#   - push to main with paths: models/artifacts/**
#   - manual workflow_dispatch
#
# 전제: secrets.ML_APP_ID + secrets.ML_APP_PRIVATE_KEY (airlens-ml-release-bot)

on:
  push:
    branches:
      - main
    paths:
      - 'models/artifacts/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3  # v3.1.1
        with:
          app-id: ${{ secrets.ML_APP_ID }}
          private-key: ${{ secrets.ML_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 1

      - name: Generate release tag
        id: tag
        run: |
          TAG="ml-$(date -u +%Y%m%d-%H%M)"
          echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "::notice::Release tag: ${TAG}"

      - name: Configure bot identity
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BOT_SLUG="${{ steps.app-token.outputs.app-slug }}"
          BOT_USER_ID=$(gh api "users/${BOT_SLUG}%5Bbot%5D" --jq .id)
          git config user.name "${BOT_SLUG}[bot]"
          git config user.email "${BOT_USER_ID}+${BOT_SLUG}[bot]@users.noreply.github.com"

      - name: Inspect artifact deltas
        id: inspect
        run: |
          # 최근 push의 artifact 변경 요약
          CHANGED=$(git diff --name-only HEAD^ HEAD -- models/artifacts/ | head -20)
          if [ -z "${CHANGED}" ]; then
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
            echo "::notice::No artifact changes detected. Manual dispatch creates a release tag anyway."
          else
            echo "no_changes=false" >> "$GITHUB_OUTPUT"
            echo "${CHANGED}" > /tmp/changed-files.txt
            echo "::notice::Artifact changes:"
            cat /tmp/changed-files.txt
          fi

      - name: Open release PR
        if: steps.inspect.outputs.no_changes == 'false' || github.event_name == 'workflow_dispatch'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: ml-release/${{ steps.tag.outputs.release_tag }}
          title: "ml-release: ${{ steps.tag.outputs.release_tag }}"
          body: |
            Automated ML model release PR — `${{ steps.tag.outputs.release_tag }}`

            Triggered by ${{ github.event_name == 'workflow_dispatch' && 'manual dispatch' || 'models/artifacts/ change' }}.

            ## Review checklist
            - [ ] Metric regressions (DQSS, MAE, R²)
            - [ ] ONNX export validity
            - [ ] HF Hub upload sha (if applicable)
            - [ ] Frontend ML API consumer (`apps/web/src/api/ml-*.ts`) 호환성
          base: main
          delete-branch: true
          add-paths: |
            models/artifacts/**

      - name: Summary
        if: always()
        run: |
          echo "## ML Release Bot" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Release tag: \`${{ steps.tag.outputs.release_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Trigger: \`${{ github.event_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.inspect.outputs.no_changes }}" = "true" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "Result: ℹ️ No-op (no artifact changes)." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Result: ✅ Release PR opened (or updated)." >> "$GITHUB_STEP_SUMMARY"
          fi
