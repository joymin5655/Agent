name: Monthly Security Audit Reminder (Tatum F4)

# Tatum HQ 보안 팁 5 흡수 (F4) — 매월 1일 KST 09:00 (= UTC 1일 00:00) 운영자에게
# Monthly Security Audit reminder 발송. GitHub Issue 자동 생성 → operator 가
# 본 issue 의 7 항목 checklist 따라 audit 진행 → 결과 wiki 에 기록 후 close.
#
# 정본:
#   - Obsidian-airlens/raw/docs/operations/observability-runbook.md §12
#   - Obsidian-airlens/wiki/log/_template-security-audit-monthly.md (audit template)
#   - ~/.claude/plans/tatum-hq-velvet-frog.md §F4 + §Deep Work D5
#
# Cadence: 매월 1일 KST 09:00 = UTC 1일 00:00 (`0 0 1 * *`)
# Manual trigger: workflow_dispatch (테스트 또는 수동 audit 시작)

on:
  schedule:
    - cron: '0 0 1 * *'  # 매월 1일 00:00 UTC = KST 09:00
  workflow_dispatch:
    inputs:
      audit_month:
        description: 'Audit month override (YYYY-MM, default = current)'
        required: false
        type: string

jobs:
  create-audit-issue:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write

    steps:
      - name: Create Monthly Security Audit issue
        uses: actions/github-script@d746ffe35508b1917358783b479e04febd2b8f71  # v9.0.0
        with:
          script: |
            const override = '${{ inputs.audit_month }}'.trim()
            const now = new Date()
            const ym = override || now.toISOString().slice(0, 7)  // YYYY-MM
            const today = now.toISOString().slice(0, 10)

            const title = `[Security Audit] Monthly checklist — ${ym}`

            const body = [
              `## Tatum F4 Monthly Security Audit — ${ym}`,
              ``,
              `Audit cadence (월 1회) — observability-runbook §12 정합. 본 issue 의 7 항목 checklist 를 따라 audit 진행 후, 결과를 \`Obsidian-airlens/wiki/log/security-audit-${ym}.md\` 에 기록 (template = \`_template-security-audit-monthly.md\`). 완료 시 본 issue close.`,
              ``,
              `**Time budget**: 60-90 분`,
              `**Owner**: 운영자 (1인 default)`,
              `**Audit date**: ${today}`,
              ``,
              `### Checklist`,
              ``,
              `- [ ] 1. RLS policy 점검 (DB schema + 신규 migration)`,
              `- [ ] 2. Rate limit rule 점검 (\`usage-controller\` quota + plan tier)`,
              `- [ ] 3. CSP header 점검 (Cloudflare Pages + \`apps/web/_headers\`)`,
              `- [ ] 4. Secret rotation 검증 (SECRETS-REGISTRY 7 row cadence)`,
              `- [ ] 5. 신규 기능 점검 (지난 1개월 PR list + Tatum 7-tip 매핑)`,
              `- [ ] 6. Alert rule 효과 (F2 §7.1 alert rule 3 false-positive 비율)`,
              `- [ ] 7. Dependency audit (\`npm audit\` + \`pip-audit\` + supply chain 7일 룰)`,
              ``,
              `### Escalation`,
              ``,
              `- **GAP 3 이상** → \`SECURITY-INCIDENT-RESPONSE.md\` §6 Phase 1 trigger`,
              `- **Critical PII GAP 1** (RLS bypass / SECRETS expired 30일+) → 즉시 incident 처리`,
              `- **PASS only** → 다음 달 audit 까지 정상 운영`,
              ``,
              `### Reference`,
              ``,
              `- Template: \`Obsidian-airlens/wiki/log/_template-security-audit-monthly.md\``,
              `- Runbook: \`Obsidian-airlens/raw/docs/operations/observability-runbook.md\` §12`,
              `- Incident response: \`Obsidian-airlens/raw/docs/operations/SECURITY-INCIDENT-RESPONSE.md\``,
              `- Plan: \`~/.claude/plans/tatum-hq-velvet-frog.md\` §F4 + §Deep Work D5`,
              ``,
              `---`,
              ``,
              `🤖 Generated by \`monthly-security-audit-reminder.yml\` (Tatum F4 D5).`,
            ].join('\n')

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['security', 'audit', 'monthly', 'tatum-f4'],
            })

            core.notice(`Created Monthly Security Audit issue #${issue.number}: ${issue.html_url}`)
