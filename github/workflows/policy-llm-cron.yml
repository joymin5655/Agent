name: Policy LLM Refresh (multilingual insights)

# Refreshes country_insight_summaries via the policy-llm Edge Function.
# Daily 03:30 UTC, batch of 5 countries — full 70-country corpus
# completes within 2 weeks; staler rows get refreshed by the
# INVALIDATION_DAYS=30 freshness gate inside the function.

on:
  schedule:
    - cron: '30 3 * * *'  # 매일 03:30 UTC (KST 12:30)
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max countries this run (default 5, max 20)'
        required: false
        default: '5'
        type: string
      country:
        description: 'Run for a single ISO code only (e.g. KR)'
        required: false
        type: string

defaults:
  run:
    working-directory: apps/web

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Trigger policy-llm Edge Function
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          INGEST_API_KEY: ${{ secrets.INGEST_API_KEY }}
          LIMIT: ${{ inputs.limit || '5' }}
          COUNTRY: ${{ inputs.country }}
        run: |
          QS="?limit=$LIMIT"
          if [ -n "$COUNTRY" ]; then QS="$QS&country=$COUNTRY"; fi
          curl --fail --silent --show-error \
            -X POST "$SUPABASE_URL/functions/v1/policy-llm$QS" \
            -H "Authorization: Bearer $INGEST_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{}'
