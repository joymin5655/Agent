name: Secret Scan

# Layer 2 of the secret-scan defense (Layer 1 = local pre-commit, Layer 3 = GitHub native scanning).
# Runs gitleaks against all PRs and pushes to main, including fork PRs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actions-pr-token-safety:
    name: actions PR token safety
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Check PR workflow token boundaries
        run: python3 scripts/maintenance/check-actions-pr-token-safety.py

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          # Full history so gitleaks can scan the entire diff against the base ref
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: ${{ github.workspace }}/gitleaks.toml
          # Optional: GITLEAKS_LICENSE for organizational use (not required for OSS)
          # GITLEAKS_NOTIFY_USER_LIST: '@joymin5655'
