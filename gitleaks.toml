# gitleaks config for Agent Harness starter-kit projects.

[extend]
useDefault = true

[allowlist]
description = "Generic starter-kit allowlist for placeholders, templates, generated files, and local runtime state"

regexes = [
  '''your[_-]?\w+[_-]?(key|token|secret|id|url|dsn|password)''',
  '''placeholder''',
  '''example[_-]?(key|token|secret|password)''',
  '''sk-(proj-)?(your|placeholder|example|test|xxx)''',
  '''id0000000000'''
]

paths = [
  '''.*\.env\.example$''',
  '''.*\.env\.sample$''',
  '''.*\.env\.template$''',
  '''.*\.template\.json$''',
  '''examples/.*''',
  '''.*/node_modules/.*''',
  '''.*/\.venv/.*''',
  '''.*\.lockb?$''',
  '''package-lock\.json$''',
  '''pnpm-lock\.yaml$''',
  '''yarn\.lock$''',
  '''memory/.*''',
  '''logs/.*''',
  '''.claude/logs/.*''',
  '''.claude/locks/.*''',
  '''.agent-harness/state/.*''',
  '''secrets/.*'''
]

commits = []
