name: Audit Log Cleanup (GDPR retention)

# Daily prune of audit_log rows older than the retention window (default
# 730 days / 24 months). Calls cleanup_audit_log() RPC defined in migration
# 00313. Dry-run mode reports the candidate count without deleting.

on:
  schedule:
    - cron: '15 4 * * *'  # 매일 04:15 UTC (KST 13:15)
  workflow_dispatch:
    inputs:
      retention_days:
        description: 'Retention window in days (default 730)'
        required: false
        default: '730'
        type: string

defaults:
  run:
    working-directory: apps/web

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Call cleanup_audit_log() RPC
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RETENTION_DAYS: ${{ inputs.retention_days || '730' }}
        run: |
          curl --fail --silent --show-error \
            -X POST "$SUPABASE_URL/rest/v1/rpc/cleanup_audit_log" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"p_retention_days\": $RETENTION_DAYS}"
