name: Hourly Data Collection (Wind + Weather + AQI)

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

jobs:
  collect-all:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Collect all data sources
        run: |
          cat > collect_all.py << 'SCRIPT'
          """
          Unified hourly data collection: Wind + Temp/RH + AQI.
          Server-Collect pattern: external APIs → JSON → Supabase Storage + DB.
          """
          import json, math, time, urllib.request, sys, os
          from datetime import datetime, timezone

          STEP = 10
          CHUNK = 30
          DELAY = 0.5
          now = datetime.now(timezone.utc)

          # ── 1. Wind Data ──────────────────────────────────────────────
          print("=== Wind Data ===")
          lats = list(range(-80, 81, STEP))
          lons = list(range(-180, 180, STEP))
          pairs = [(lat, lon) for lat in lats for lon in lons]
          wind_points = []

          for ci in range(0, len(pairs), CHUNK):
              chunk = pairs[ci:ci+CHUNK]
              lat_s = ",".join(str(p[0]) for p in chunk)
              lon_s = ",".join(str(p[1]) for p in chunk)
              url = f"https://api.open-meteo.com/v1/forecast?latitude={lat_s}&longitude={lon_s}&current=wind_speed_10m,wind_direction_10m"
              for attempt in range(3):
                  try:
                      data = json.loads(urllib.request.urlopen(url, timeout=15).read())
                      for item in (data if isinstance(data, list) else [data]):
                          if "latitude" in item and "current" in item:
                              wind_points.append({
                                  "lat": item["latitude"], "lon": item["longitude"],
                                  "spd": (item["current"].get("wind_speed_10m", 0)) / 3.6,
                                  "dir": item["current"].get("wind_direction_10m", 0),
                              })
                      break
                  except Exception as e:
                      print(f"  Wind chunk {ci//CHUNK} attempt {attempt}: {e}", file=sys.stderr)
                      time.sleep(2 * (attempt + 1))
              if ci + CHUNK < len(pairs):
                  time.sleep(DELAY)

          ny, nx = len(lats), len(lons)
          u, v = [0.0] * (ny * nx), [0.0] * (ny * nx)
          for p in wind_points:
              j = round((p["lat"] - lats[0]) / STEP)
              i = round((p["lon"] - lons[0]) / STEP)
              if 0 <= j < ny and 0 <= i < nx:
                  rad = p["dir"] * math.pi / 180
                  u[j * nx + i] = -p["spd"] * math.sin(rad)
                  v[j * nx + i] = -p["spd"] * math.cos(rad)

          ur, vr = [0.0] * (ny * nx), [0.0] * (ny * nx)
          for r in range(ny):
              for c in range(nx):
                  ur[(ny - 1 - r) * nx + c] = u[r * nx + c]
                  vr[(ny - 1 - r) * nx + c] = v[r * nx + c]

          wind_hdr = {
              "nx": nx, "ny": ny, "lo1": lons[0], "la1": lats[-1],
              "dx": STEP, "dy": STEP,
              "refTime": now.isoformat(), "forecastTime": 0,
              "centerName": "Open-Meteo/GFS",
          }
          with open("wind-data.json", "w") as f:
              json.dump([
                  {"header": wind_hdr, "data": [round(x, 4) for x in ur]},
                  {"header": wind_hdr, "data": [round(x, 4) for x in vr]},
              ], f, separators=(",", ":"))
          print(f"  Wind: {len(wind_points)} points")

          # ── 2. Temperature + Humidity ─────────────────────────────────
          print("=== Weather Grid ===")
          weather_grid = {}
          for ci in range(0, len(pairs), CHUNK):
              chunk = pairs[ci:ci+CHUNK]
              lat_s = ",".join(str(p[0]) for p in chunk)
              lon_s = ",".join(str(p[1]) for p in chunk)
              url = f"https://api.open-meteo.com/v1/forecast?latitude={lat_s}&longitude={lon_s}&current=temperature_2m,relative_humidity_2m"
              for attempt in range(3):
                  try:
                      data = json.loads(urllib.request.urlopen(url, timeout=15).read())
                      for item in (data if isinstance(data, list) else [data]):
                          if "latitude" in item and "current" in item:
                              weather_grid[f"{item['latitude']},{item['longitude']}"] = {
                                  "lat": item["latitude"], "lon": item["longitude"],
                                  "temp": item["current"].get("temperature_2m"),
                                  "rh": item["current"].get("relative_humidity_2m"),
                              }
                      break
                  except Exception as e:
                      print(f"  Weather chunk {ci//CHUNK} attempt {attempt}: {e}", file=sys.stderr)
                      time.sleep(2 * (attempt + 1))
              if ci + CHUNK < len(pairs):
                  time.sleep(DELAY)

          weather_pts = list(weather_grid.values())
          with open("weather-grid.json", "w") as f:
              json.dump({
                  "refTime": now.isoformat(), "step": STEP, "count": len(weather_pts),
                  "points": [
                      {"lat": p["lat"], "lon": p["lon"],
                       "temp": round(p["temp"], 1) if p["temp"] is not None else None,
                       "rh": p["rh"],
                       "precip": round(p["precip"], 2) if p.get("precip") is not None else None,
                       "cloud": p.get("cloud"),
                       "uvi": round(p["uvi"], 1) if p.get("uvi") is not None else None,
                       "mslp": round(p["mslp"], 1) if p.get("mslp") is not None else None}
                      for p in weather_pts
                  ],
              }, f, separators=(",", ":"))
          print(f"  Weather: {len(weather_pts)} points")

          # ── 3. Marine Data (SST + Waves + Currents) ──────────────────
          print("=== Marine Data ===")
          MARINE_STEP = 10
          marine_lats = list(range(-60, 61, MARINE_STEP))
          marine_lons = list(range(-180, 180, MARINE_STEP))
          marine_pairs = [(lat, lon) for lat in marine_lats for lon in marine_lons]
          marine_points = []
          marine_vars = "sea_surface_temperature,significant_height_of_combined_wind_waves_and_swell,ocean_current_velocity,ocean_current_direction"

          for ci in range(0, len(marine_pairs), CHUNK):
              chunk = marine_pairs[ci:ci+CHUNK]
              lat_s = ",".join(str(p[0]) for p in chunk)
              lon_s = ",".join(str(p[1]) for p in chunk)
              url = f"https://marine-api.open-meteo.com/v1/marine?latitude={lat_s}&longitude={lon_s}&current={marine_vars}"
              for attempt in range(3):
                  try:
                      data = json.loads(urllib.request.urlopen(url, timeout=15).read())
                      for item in (data if isinstance(data, list) else [data]):
                          if "latitude" in item and "current" in item:
                              c = item["current"]
                              marine_points.append({
                                  "lat": item["latitude"], "lon": item["longitude"],
                                  "sst": c.get("sea_surface_temperature"),
                                  "waves": c.get("significant_height_of_combined_wind_waves_and_swell"),
                                  "current_vel": c.get("ocean_current_velocity"),
                                  "current_dir": c.get("ocean_current_direction"),
                              })
                      break
                  except Exception as e:
                      print(f"  Marine chunk {ci//CHUNK} attempt {attempt}: {e}", file=sys.stderr)
                      time.sleep(2 * (attempt + 1))
              if ci + CHUNK < len(marine_pairs):
                  time.sleep(DELAY)

          with open("marine-data.json", "w") as f:
              json.dump({"refTime": now.isoformat(), "step": MARINE_STEP, "count": len(marine_points), "points": marine_points}, f, separators=(",", ":"))
          print(f"  Marine: {len(marine_points)} points")

          # ── 5. AQ Grid Data (PM2.5, PM10, O3, NO2, CO) ──────────────
          print("=== AQ Grid Data ===")
          AQ_STEP = 5
          aq_lats = list(range(-80, 81, AQ_STEP))
          aq_lons = list(range(-180, 180, AQ_STEP))
          aq_pairs = [(lat, lon) for lat in aq_lats for lon in aq_lons]
          aq_variables = {
              "pm2_5": [],
              "pm10": [],
              "ozone": [],
              "nitrogen_dioxide": [],
              "carbon_monoxide": [],
          }

          for ci in range(0, len(aq_pairs), CHUNK):
              chunk = aq_pairs[ci:ci+CHUNK]
              lat_s = ",".join(str(p[0]) for p in chunk)
              lon_s = ",".join(str(p[1]) for p in chunk)
              var_s = ",".join(aq_variables.keys())
              url = f"https://air-quality-api.open-meteo.com/v1/air-quality?latitude={lat_s}&longitude={lon_s}&current={var_s}"
              for attempt in range(3):
                  try:
                      data = json.loads(urllib.request.urlopen(url, timeout=15).read())
                      for item in (data if isinstance(data, list) else [data]):
                          if "latitude" in item and "current" in item:
                              c = item["current"]
                              for var_name in aq_variables:
                                  val = c.get(var_name)
                                  if val is not None and not (isinstance(val, float) and (math.isnan(val) or math.isinf(val))):
                                      aq_variables[var_name].append({
                                          "lat": item["latitude"],
                                          "lon": item["longitude"],
                                          "value": round(val, 2),
                                      })
                      break
                  except Exception as e:
                      print(f"  AQ grid chunk {ci//CHUNK} attempt {attempt}: {e}", file=sys.stderr)
                      time.sleep(2 * (attempt + 1))
              if ci + CHUNK < len(aq_pairs):
                  time.sleep(DELAY)

          var_file_map = {
              "pm2_5": "current-pm25-grid",
              "pm10": "current-pm10-grid",
              "ozone": "current-o3-grid",
              "nitrogen_dioxide": "current-no2-grid",
              "carbon_monoxide": "current-co-grid",
          }
          for var_name, file_prefix in var_file_map.items():
              pts = aq_variables[var_name]
              grid_data = {
                  "variable": var_name,
                  "resolution": AQ_STEP,
                  "timestamp": int(now.timestamp() * 1000),
                  "nLat": len(aq_lats),
                  "nLon": len(aq_lons),
                  "latMin": aq_lats[0],
                  "lonMin": aq_lons[0],
                  "dLat": AQ_STEP,
                  "dLon": AQ_STEP,
                  "points": pts,
              }
              with open(f"{file_prefix}.json", "w") as f:
                  json.dump(grid_data, f, separators=(",", ":"))
              print(f"  {var_name}: {len(pts)} points -> {file_prefix}.json")

          print(f"\nDone: wind={len(wind_points)}, weather={len(weather_pts)}, marine={len(marine_points)}, aq_grid={sum(len(v) for v in aq_variables.values())}")
          SCRIPT
          python3 collect_all.py

      - name: Create GFS wind backup copy
        run: |
          if [ -f wind-data.json ]; then
            cp wind-data.json gfs-wind-backup.json
          fi

      - name: Upload latest snapshots to Supabase Storage
        run: |
          for FILE in wind-data weather-grid marine-data gfs-wind-backup; do
            if [ -f "${FILE}.json" ]; then
              curl -s -X POST \
                "${SUPABASE_URL}/storage/v1/object/wind-data/${FILE}.json" \
                -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
                -H "Content-Type: application/json" \
                -H "x-upsert: true" \
                --data-binary "@${FILE}.json" \
                -w "  ${FILE}: HTTP %{http_code}\n" -o /dev/null
            fi
          done

      - name: Upload AQ grid data to Supabase Storage
        run: |
          for FILE in current-pm25-grid current-pm10-grid current-o3-grid current-no2-grid current-co-grid; do
            if [ -f "${FILE}.json" ]; then
              curl -s -X POST \
                "${SUPABASE_URL}/storage/v1/object/aq-data/${FILE}.json" \
                -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
                -H "Content-Type: application/json" \
                -H "x-upsert: true" \
                --data-binary "@${FILE}.json" \
                -w "  ${FILE}: HTTP %{http_code}\n" -o /dev/null
            fi
          done

      - name: Insert history records to Supabase DB
        run: |
          cat > insert_history.py << 'SCRIPT'
          import json, os, urllib.request

          URL = os.environ["SUPABASE_URL"]
          KEY = os.environ["SUPABASE_SERVICE_KEY"]

          def insert(table, payload):
              data = json.dumps(payload).encode()
              req = urllib.request.Request(
                  f"{URL}/rest/v1/{table}", data=data, method="POST",
                  headers={
                      "Authorization": f"Bearer {KEY}", "apikey": KEY,
                      "Content-Type": "application/json", "Prefer": "return=minimal",
                  },
              )
              try:
                  urllib.request.urlopen(req, timeout=15)
                  print(f"  {table} ({payload['data_type']}): inserted")
              except Exception as e:
                  print(f"  {table} ({payload['data_type']}): {e}")

          with open("wind-data.json") as f:
              wind = json.load(f)
          insert("weather_history", {
              "data_type": "wind",
              "ref_time": wind[0]["header"]["refTime"],
              "point_count": wind[0]["header"]["nx"] * wind[0]["header"]["ny"],
              "payload": wind,
          })

          with open("weather-grid.json") as f:
              weather = json.load(f)
          insert("weather_history", {
              "data_type": "weather",
              "ref_time": weather["refTime"],
              "point_count": weather["count"],
              "payload": weather,
          })

          with open("marine-data.json") as f:
              marine = json.load(f)
          if marine["count"] > 0:
              insert("weather_history", {
                  "data_type": "marine",
                  "ref_time": marine["refTime"],
                  "point_count": marine["count"],
                  "payload": marine,
              })
          SCRIPT
          python3 insert_history.py

      - name: Generate 24h PM2.5 history summary
        run: |
          cat > gen_history.py << 'SCRIPT'
          """
          Query weather_history (data_type='aqi', last 24h) and generate a
          compact summary JSON with top stations for PM25Chart + StationsTable.
          Server-Collect pattern: DB query → JSON → Supabase Storage.
          """
          import json, os, urllib.request
          from datetime import datetime, timezone, timedelta

          URL = os.environ["SUPABASE_URL"]
          KEY = os.environ["SUPABASE_SERVICE_KEY"]
          now = datetime.now(timezone.utc)
          cutoff = (now - timedelta(hours=24)).isoformat()

          # Query last 24h AQI snapshots from weather_history
          headers = {
              "Authorization": f"Bearer {KEY}",
              "apikey": KEY,
              "Content-Type": "application/json",
          }
          query_url = (
              f"{URL}/rest/v1/weather_history"
              f"?data_type=eq.aqi"
              f"&ref_time=gte.{cutoff}"
              f"&order=ref_time.asc"
              f"&select=ref_time,payload"
          )
          req = urllib.request.Request(query_url, headers=headers)

          try:
              resp = urllib.request.urlopen(req, timeout=30)
              rows = json.loads(resp.read())
          except Exception as e:
              print(f"  DB query failed: {e}")
              rows = []

          if not rows:
              print("  No AQI history found — skipping summary generation")
          else:
              # Build per-station history
              stations = {}  # uid -> { name, lat, lon, hours: [{time, aqi}] }
              for row in rows:
                  ref = row["ref_time"]
                  payload = row["payload"]
                  if isinstance(payload, str):
                      payload = json.loads(payload)
                  for s in payload.get("stations", []):
                      uid = s.get("uid", "")
                      if not uid:
                          continue
                      if uid not in stations:
                          stations[uid] = {
                              "name": s.get("station", ""),
                              "lat": s.get("lat", 0),
                              "lon": s.get("lon", 0),
                              "hours": [],
                          }
                      stations[uid]["hours"].append({
                          "time": ref,
                          "aqi": s.get("aqi", 0),
                      })

              # Keep only stations with >= 6 data points (at least 6h coverage)
              filtered = {
                  uid: info for uid, info in stations.items()
                  if len(info["hours"]) >= 6
              }

              # Sort by latest AQI desc, keep top 200
              top = sorted(
                  filtered.items(),
                  key=lambda x: x[1]["hours"][-1]["aqi"] if x[1]["hours"] else 0,
                  reverse=True,
              )[:200]

              # Add trend data (current vs 24h ago)
              result = {"generated_at": now.isoformat(), "stations": {}}
              for uid, info in top:
                  hours = info["hours"]
                  current_aqi = hours[-1]["aqi"] if hours else 0
                  ago_aqi = hours[0]["aqi"] if hours else 0
                  result["stations"][uid] = {
                      "name": info["name"],
                      "lat": info["lat"],
                      "lon": info["lon"],
                      "current_aqi": current_aqi,
                      "aqi_24h_ago": ago_aqi,
                      "hours": hours,
                  }

              with open("pm25-history-24h.json", "w") as f:
                  json.dump(result, f, separators=(",", ":"))
              print(f"  PM2.5 history: {len(result['stations'])} stations, {len(rows)} snapshots")

              # Upload to Supabase Storage
              with open("pm25-history-24h.json", "rb") as f:
                  data = f.read()
              upload_url = f"{URL}/storage/v1/object/wind-data/pm25-history-24h.json"
              upload_req = urllib.request.Request(
                  upload_url, data=data, method="POST",
                  headers={
                      "Authorization": f"Bearer {KEY}",
                      "Content-Type": "application/json",
                      "x-upsert": "true",
                  },
              )
              try:
                  urllib.request.urlopen(upload_req, timeout=15)
                  print("  Uploaded pm25-history-24h.json")
              except Exception as e:
                  print(f"  Upload failed: {e}")
          SCRIPT
          python3 gen_history.py

      - name: Verify uploads
        run: |
          for FILE in wind-data weather-grid pm25-history-24h; do
            curl -s -o /dev/null -w "  ${FILE}: HTTP %{http_code}\n" \
              "${SUPABASE_URL}/storage/v1/object/public/wind-data/${FILE}.json"
          done
          for FILE in current-pm25-grid current-pm10-grid current-o3-grid current-no2-grid current-co-grid; do
            curl -s -o /dev/null -w "  ${FILE}: HTTP %{http_code}\n" \
              "${SUPABASE_URL}/storage/v1/object/public/aq-data/${FILE}.json"
          done
