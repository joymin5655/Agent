name: Frontend Data Sync

on:
  schedule:
    - cron: '15 * * * *'  # 매시간 15분 (data-collect-hourly 10분 후)
  workflow_dispatch:

# `contents: write` to push the data-sync branch; `pull-requests: write`
# to open/update the PR via peter-evans/create-pull-request.
permissions:
  contents: write
  pull-requests: write

defaults:
  run:
    working-directory: apps/web

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # GitHub App 토큰 발급. App이 push/PR open을 수행하면 GITHUB_TOKEN과 달리
      # CI 워크플로(PR Check 등)가 정상 트리거된다 (재귀 차단 정책 우회).
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3  # v3.1.1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout (full repo for public/data/ access)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
          # App 토큰을 checkout이 영구화하면 peter-evans/create-pull-request의
          # 자체 인증과 충돌해 "Duplicate header: Authorization" 에러 발생.
          # 다음 액션이 자체 인증을 처리하도록 비활성화.
          persist-credentials: false

      - name: Download latest from Supabase Storage
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          CHANGED=0

          download() {
            local BUCKET="$1"
            local FILE="$2"
            local TARGET="$3"
            mkdir -p "$(dirname "$TARGET")"

            HTTP_CODE=$(curl -s -w "%{http_code}" -o "$TARGET.tmp" \
              "${SUPABASE_URL}/storage/v1/object/${BUCKET}/${FILE}" \
              -H "Authorization: Bearer ${SUPABASE_KEY}")

            if [ "$HTTP_CODE" = "200" ] && [ -s "$TARGET.tmp" ]; then
              if [ ! -f "$TARGET" ] || ! diff -q "$TARGET.tmp" "$TARGET" > /dev/null 2>&1; then
                mv "$TARGET.tmp" "$TARGET"
                CHANGED=$((CHANGED + 1))
                echo "  Updated: $TARGET"
              else
                rm "$TARGET.tmp"
              fi
            else
              echo "  Skip (HTTP ${HTTP_CODE}): ${BUCKET}/${FILE}"
              rm -f "$TARGET.tmp"
            fi
          }

          echo "=== Wind & Weather (wind-data bucket) ==="
          download "wind-data" "wind-data.json" "public/data/wind-data.json"
          download "wind-data" "weather-grid.json" "public/data/weather-grid.json"
          download "wind-data" "marine-data.json" "public/data/marine-data.json"
          download "wind-data" "pm25-daily-90d.json" "public/data/analytics/pm25-daily-90d.json"

          echo "=== AQ Grid (aq-data bucket) ==="
          download "aq-data" "current-pm25-grid.json" "public/data/current-pm25-grid.json"
          download "aq-data" "current-pm10-grid.json" "public/data/current-pm10-grid.json"
          download "aq-data" "current-o3-grid.json" "public/data/current-o3-grid.json"
          download "aq-data" "current-no2-grid.json" "public/data/current-no2-grid.json"
          download "aq-data" "current-co-grid.json" "public/data/current-co-grid.json"

          echo "sync_changed=$CHANGED" >> "$GITHUB_ENV"
          if [ "$CHANGED" -gt 0 ]; then
            echo "sync_needed=true" >> "$GITHUB_ENV"
            echo "::notice::$CHANGED files updated in public/data/"
          else
            echo "sync_needed=false" >> "$GITHUB_ENV"
            echo "::notice::No changes detected"
          fi

      # Open a PR instead of pushing directly. `main` is a protected branch
      # (`GH006: protected branch update failed for refs/heads/main`); the
      # previous direct-push step had been failing every cron tick. The
      # action stages the diff, commits, opens (or updates) a single rolling
      # PR per branch, and is a no-op when there are no changes.
      - name: Open PR for data sync
        if: env.sync_needed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          # App 토큰 사용 — GITHUB_TOKEN 대신 사용하면 PR 생성 시 CI 트리거됨.
          token: ${{ steps.app-token.outputs.token }}
          # Working dir is apps/web; pass the path *relative to repo root*
          # for the staged file globs.
          path: ${{ github.workspace }}
          add-paths: |
            apps/web/public/data/**
          branch: chore/data-sync
          delete-branch: true
          base: main
          commit-message: "chore: sync frontend data from Supabase Storage (${{ env.sync_changed }} files)"
          title: "chore: sync frontend data from Supabase Storage"
          body: |
            Automated hourly sync of `apps/web/public/data/` from Supabase Storage
            (wind-data + aq-data buckets).

            - Files updated: ${{ env.sync_changed }}
            - Triggered by: `${{ github.workflow }}` cron / workflow_dispatch
            - Runs hourly at :15 — this PR is updated in place; merge any time
              or close to discard.

      - name: Summary
        if: always()
        run: |
          echo "## Frontend Data Sync" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source: Supabase Storage (wind-data, aq-data buckets)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Changed files: ${sync_changed:-0}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Sync needed: ${sync_needed:-false}" >> "$GITHUB_STEP_SUMMARY"
