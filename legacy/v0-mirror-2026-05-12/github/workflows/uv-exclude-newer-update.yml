name: uv exclude-newer Weekly Update (Tatum F5(c))

# Tatum HQ 보안 팁 7 흡수 (F5 c) — 매주 월 KST 09:00 (= UTC 일 00:00) `models/pyproject.toml`
# 의 `[tool.uv].exclude-newer` ISO timestamp 를 (현 시각 - 7 days) 로 자동 갱신.
# Supply chain 7일 룰 (정합: root .npmrc min-release-age=7) 자동 유지.
#
# 정본:
#   - models/pyproject.toml [tool.uv]
#   - Obsidian-airlens/raw/docs/operations/SECRETS-REGISTRY.md (supply chain 룰 cross-ref)
#   - ~/.claude/plans/tatum-hq-velvet-frog.md §F5 (c) + §Deep Work D7 (a)
#
# Cadence: 매주 월 KST 09:00 = UTC 일 00:00 (`0 0 * * 0` 일요일 00:00 UTC)
# 직접 commit 회피 — PR 패턴 (R5 PR 직렬화 정합, 사람 머지 serialize)

on:
  schedule:
    - cron: '0 0 * * 0'  # 매주 일요일 00:00 UTC = KST 월 09:00
  workflow_dispatch:

jobs:
  update-uv-exclude-newer:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Compute target ISO timestamp (-7 days)
        id: compute
        run: |
          target_iso=$(python3 -c "
          import datetime
          target = datetime.datetime.utcnow() - datetime.timedelta(days=7)
          # 00:00:00Z midnight 으로 정렬 (deterministic)
          print(target.strftime('%Y-%m-%dT00:00:00Z'))
          ")
          echo "target_iso=$target_iso" >> "$GITHUB_OUTPUT"
          echo "Target ISO timestamp: $target_iso"

      - name: Update pyproject.toml exclude-newer
        run: |
          python3 <<'PY'
          import re
          from pathlib import Path

          path = Path('models/pyproject.toml')
          text = path.read_text()
          new_iso = "${{ steps.compute.outputs.target_iso }}"

          pattern = re.compile(r'(exclude-newer\s*=\s*")[^"]*(")')
          if not pattern.search(text):
              raise SystemExit('FAIL: exclude-newer key not found in models/pyproject.toml')

          updated = pattern.sub(rf'\g<1>{new_iso}\g<2>', text)
          if updated == text:
              print('No change (timestamp already current)')
          else:
              path.write_text(updated)
              print(f'Updated exclude-newer = "{new_iso}"')
          PY

      - name: Detect change
        id: diff
        run: |
          if git diff --quiet models/pyproject.toml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes — exiting"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff models/pyproject.toml | head -20
          fi

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(models): update uv exclude-newer to ${{ steps.compute.outputs.target_iso }}"
          title: "chore(models): weekly uv exclude-newer update — ${{ steps.compute.outputs.target_iso }}"
          body: |
            ## Tatum F5 (c) — Weekly uv supply chain timestamp update

            Automated update of `models/pyproject.toml` `[tool.uv].exclude-newer` to **`${{ steps.compute.outputs.target_iso }}`** (7 days ago, midnight UTC).

            정합: root `.npmrc min-release-age=7` / `pnpm minimum-release-age=10080` / `bun minimumReleaseAge=604800`.

            **검증**:
            - `uv pip install -e ".[dev]"` (또는 `uv sync`) 가 7일 미만 신규 release 패키지 차단 확인
            - 신규 release 누락 = 의도된 동작 (supply chain 7일 grace)

            **머지 정책**: R5 PR 직렬화 — 사람이 review 후 머지. CI green 확인 필수.

            🤖 Generated by `.github/workflows/uv-exclude-newer-update.yml` (Tatum F5 c D7 a).

            Plan: `~/.claude/plans/tatum-hq-velvet-frog.md` §F5 (c) + §Deep Work D7 (a)
          branch: chore/uv-exclude-newer-update
          delete-branch: true
          labels: |
            chore
            supply-chain
            tatum-f5
          base: main
